      <stop offset="0" stop-color="#1e6bff"/>
      <stop offset="1" stop-color="#1eb8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0b2142" flood-opacity=".16"/>
    </filter>
  </defs>
